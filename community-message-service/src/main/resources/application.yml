server:
  port: 8082
  servlet:
    context-path: /community

spring:
  application:
    name: message-service
  thymeleaf:
    cache: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/study?characterEncoding=utf-8&useSSL=false&serverTimezone=Hongkong&allowPublicKeyRetrieval=true
    username: root
    password: root
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-consumer-group
      enable-auto-commit: true
      auto-commit-interval: 3000
  data:
    elasticsearch:
      cluster-name: nowcoder
      cluster-nodes: 127.0.0.1:9300
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.entity
  configuration:
    use-generated-keys: true
    map-underscore-to-camel-case: true

wk:
  image:
    command: D:/Developer/wkhtmltox/wkhtmltopdf/bin/wkhtmltoimage
    storage: D:/work/data/wk-images

qiniu:
  key:
    access: H90JMQ_wmUw5MMDqV-xOV9dZPZCEbNORkIyl19mp
    secret: VMIf2MgExR8bfDfayx64nIvMunkbFm5bCNzKSMis
  bucket:
    share:
      name: study-share03

management:
  endpoints:
    web:
      exposure:
        include: '*'
        exclude: info,caches
