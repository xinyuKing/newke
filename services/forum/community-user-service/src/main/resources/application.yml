server:
  port: 8081
  servlet:
    context-path: /community

spring:
  application:
    name: user-service
  thymeleaf:
    cache: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/study?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
  redis:
    database: ${FORUM_REDIS_DATABASE:11}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  mail:
    host: ${FORUM_MAIL_HOST:smtp.163.com}
    port: ${FORUM_MAIL_PORT:465}
    username: ${FORUM_MAIL_USERNAME:}
    password: ${FORUM_MAIL_PASSWORD:}
    protocol: ${FORUM_MAIL_PROTOCOL:smtps}
    properties:
      mail:
        smtp:
          ssl:
            enable: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.entity
  configuration:
    use-generated-keys: true
    map-underscore-to-camel-case: true

community:
  path:
    domain: ${COMMUNITY_PUBLIC_DOMAIN:http://localhost:8080}
    upload: ${FORUM_UPLOAD_PATH:./runtime/community/upload}

qiniu:
  key:
    access: ${QINIU_ACCESS_KEY:}
    secret: ${QINIU_SECRET_KEY:}
  bucket:
    upload:
      host: ${QINIU_UPLOAD_HOST:https://upload-cn-east-2.qiniup.com}
    header:
      name: ${QINIU_HEADER_BUCKET:}
      url: ${QINIU_HEADER_BUCKET_URL:}

management:
  endpoints:
    web:
      exposure:
        include: '*'
        exclude: info,caches
