# Server
server.port=8086
server.servlet.context-path=/community
spring.application.name=post-service

# Thymeleaf
spring.thymeleaf.cache=false

# DataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/study?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.maximum-pool-size=150
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.idle-timeout=30000

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.nowcoder.community.entity
mybatis.configuration.useGeneratedKeys=true
mybatis.configuration.mapUnderscoreToCamelCase=true

# Mail
spring.mail.host=${FORUM_MAIL_HOST:smtp.163.com}
spring.mail.port=${FORUM_MAIL_PORT:465}
spring.mail.username=${FORUM_MAIL_USERNAME:}
spring.mail.password=${FORUM_MAIL_PASSWORD:}
spring.mail.protocol=${FORUM_MAIL_PROTOCOL:smtps}
spring.mail.properties.mail.smtp.ssl.enable=true

# Community paths
community.path.domain=${COMMUNITY_PUBLIC_DOMAIN:http://localhost:8080}
community.path.upload=${FORUM_UPLOAD_PATH:./runtime/community/upload}
community.path.media=${FORUM_MEDIA_PATH:./runtime/community/upload/media}
community.media.allowed-image-types=jpg,jpeg,png,gif,webp
community.media.allowed-video-types=mp4,webm,ogg
community.media.max-image-mb=10
community.media.max-video-mb=200
community.cors.allowed-origins=${COMMUNITY_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Moderation
community.moderation.enabled=${COMMUNITY_MODERATION_ENABLED:true}
community.moderation.max-reasons=3
community.moderation.mode=${COMMUNITY_MODERATION_MODE:rules}
community.moderation.llm.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
community.moderation.llm.api-key=${OPENAI_API_KEY:}
community.moderation.llm.model=${OPENAI_MODEL:gpt-5-mini}
community.moderation.llm.threshold=70
community.moderation.llm.timeout-ms=8000
community.moderation.llm.fail-open=false
community.moderation.llm.max-reasons=3
community.moderation.llm.prompt-file=classpath:moderation_prompt.txt

# Redis
spring.redis.database=${FORUM_REDIS_DATABASE:11}
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=test-consumer-group
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-commit-interval=3000

# Elasticsearch / OpenSearch
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://127.0.0.1:9200}

# Task execution
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=15
spring.task.execution.pool.queue-capacity=100

# Task scheduling
spring.task.scheduling.pool.size=5

# Quartz
spring.quartz.job-store-type=jdbc
spring.quartz.scheduler-name=communityScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
spring.quartz.properties.org.quartz.threadPool.threadCount=50

# wkhtmltoimage
wk.image.command=${WKHTMLTOIMAGE_COMMAND:wkhtmltoimage}
wk.image.storage=${FORUM_WK_STORAGE:./runtime/community/wk-images}

# Qiniu
qiniu.key.access=${QINIU_ACCESS_KEY:}
qiniu.key.secret=${QINIU_SECRET_KEY:}
qiniu.bucket.header.name=${QINIU_HEADER_BUCKET:}
qiniu.bucket.header.url=${QINIU_HEADER_BUCKET_URL:}
qiniu.bucket.share.name=${QINIU_SHARE_BUCKET:}
qiniu.bucket.share.url=${QINIU_SHARE_BUCKET_URL:}

# Caffeine cache
caffeine.posts.max-size=15
caffeine.posts.expire-seconds=180

# Actuator
management.endpoints.web.exposure.include=*
management.endpoints.web.exposure.exclude=info,caches
