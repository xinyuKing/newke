server:
  port: 8082
  servlet:
    context-path: /community

spring:
  application:
    name: message-service
  thymeleaf:
    cache: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/study?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: test-consumer-group
      enable-auto-commit: true
      auto-commit-interval: 3000
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://127.0.0.1:9200}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.entity
  configuration:
    use-generated-keys: true
    map-underscore-to-camel-case: true

wk:
  image:
    command: ${WKHTMLTOIMAGE_COMMAND:wkhtmltoimage}
    storage: ${FORUM_WK_STORAGE:./runtime/community/wk-images}

qiniu:
  key:
    access: ${QINIU_ACCESS_KEY:}
    secret: ${QINIU_SECRET_KEY:}
  bucket:
    share:
      name: ${QINIU_SHARE_BUCKET:}

management:
  endpoints:
    web:
      exposure:
        include: '*'
        exclude: info,caches
