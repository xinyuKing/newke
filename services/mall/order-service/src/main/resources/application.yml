server:
  port: 18084

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/ecommerce_order?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN:10}
      connection-timeout: ${DB_CONN_TIMEOUT_MS:2000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
    read:
      url: ${DB_READ_URL:}
      username: ${DB_READ_USER:}
      password: ${DB_READ_PASS:}
      hikari:
        maximum-pool-size: ${DB_READ_POOL_MAX:20}
        minimum-idle: ${DB_READ_POOL_MIN:5}
        connection-timeout: ${DB_READ_CONN_TIMEOUT_MS:2000}
        idle-timeout: ${DB_READ_IDLE_TIMEOUT_MS:600000}
        max-lifetime: ${DB_READ_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT_MS:1000}ms
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX:32}
          max-idle: ${REDIS_POOL_MAX_IDLE:16}
          min-idle: ${REDIS_POOL_MIN_IDLE:4}
          max-wait: ${REDIS_POOL_MAX_WAIT_MS:2000}ms
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
  cache:
    type: caffeine
  caffeine:
    spec: maximumSize=5000,expireAfterWrite=120s

inventory:
  service:
    # 订单服务和库存服务之间保持内部直连边界。
    url: ${MALL_INVENTORY_SERVICE_URL:http://localhost:18083}

product:
  service:
    # 订单服务直接访问商品服务查询快照信息，不经过网关。
    url: ${MALL_PRODUCT_SERVICE_URL:http://localhost:18082}

auth:
  service:
    url: ${MALL_AUTH_SERVICE_URL:http://localhost:18081}

logistics:
  provider: ${LOGISTICS_PROVIDER:mock}
  api:
    url: ${LOGISTICS_API_URL:}
    key: ${LOGISTICS_API_KEY:}

security:
  client-ip:
    trusted-proxies:
      - ${TRUSTED_PROXY_CIDR_1:127.0.0.1/32}
      - ${TRUSTED_PROXY_CIDR_2:::1/128}
  jwt:
    secret: ${JWT_SECRET}
    expire-minutes: ${JWT_EXPIRE_MINUTES:120}

internal:
  auth:
    enabled: true
    secret: ${INTERNAL_API_SECRET}
    allowed-callers:
      - cart-service
      - product-service
      - support-service

logging:
  level:
    root: INFO

order:
  duplicate:
    guard-ttl: ${ORDER_DUPLICATE_GUARD_TTL:15s}
  rate-limit:
    window-seconds: ${ORDER_RATE_WINDOW:60}
    user-max: ${ORDER_RATE_USER_MAX:30}
    ip-max: ${ORDER_RATE_IP_MAX:60}
    algorithm: ${ORDER_RATE_ALGO:fixed}

resilience4j:
  circuitbreaker:
    instances:
      productClient:
        sliding-window-size: 50
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
      inventoryClient:
        sliding-window-size: 50
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
  retry:
    instances:
      productClient:
        max-attempts: 2
        wait-duration: 100ms
      inventoryClient:
        max-attempts: 2
        wait-duration: 100ms
  bulkhead:
    instances:
      productClient:
        max-concurrent-calls: 50
        max-wait-duration: 0
      inventoryClient:
        max-concurrent-calls: 50
        max-wait-duration: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
