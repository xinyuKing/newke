server:
  port: 18082

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/ecommerce_product?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN:10}
      connection-timeout: ${DB_CONN_TIMEOUT_MS:2000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
    read:
      url: ${DB_READ_URL:}
      username: ${DB_READ_USER:}
      password: ${DB_READ_PASS:}
      hikari:
        maximum-pool-size: ${DB_READ_POOL_MAX:20}
        minimum-idle: ${DB_READ_POOL_MIN:5}
        connection-timeout: ${DB_READ_CONN_TIMEOUT_MS:2000}
        idle-timeout: ${DB_READ_IDLE_TIMEOUT_MS:600000}
        max-lifetime: ${DB_READ_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT_MS:1000}ms
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX:32}
          max-idle: ${REDIS_POOL_MAX_IDLE:16}
          min-idle: ${REDIS_POOL_MIN_IDLE:4}
          max-wait: ${REDIS_POOL_MAX_WAIT_MS:2000}ms

inventory:
  service:
    # 商品只直接访问库存服务，避免跨层绕到网关。
    url: ${MALL_INVENTORY_SERVICE_URL:http://localhost:18083}

search:
  provider: ${SEARCH_PROVIDER:auto}
  fallback-to-db: ${SEARCH_FALLBACK:true}
  cache-ttl-seconds: ${SEARCH_CACHE_TTL_SECONDS:60}
  opensearch:
    url: ${OPENSEARCH_URL:}
    index: ${OPENSEARCH_INDEX:products}
    username: ${OPENSEARCH_USER:}
    password: ${OPENSEARCH_PASS:}
    connect-timeout-ms: ${OPENSEARCH_CONN_TIMEOUT_MS:2000}
    read-timeout-ms: ${OPENSEARCH_READ_TIMEOUT_MS:3000}
    initialize-on-startup: ${OPENSEARCH_INIT_ON_STARTUP:true}
    bootstrap-batch-size: ${OPENSEARCH_BOOTSTRAP_BATCH_SIZE:200}

security:
  client-ip:
    trusted-proxies:
      - ${TRUSTED_PROXY_CIDR_1:127.0.0.1/32}
      - ${TRUSTED_PROXY_CIDR_2:::1/128}
  jwt:
    secret: ${JWT_SECRET}
    expire-minutes: ${JWT_EXPIRE_MINUTES:120}

internal:
  auth:
    enabled: true
    secret: ${INTERNAL_API_SECRET}
    allowed-callers:
      - order-service
      - cart-service

logging:
  level:
    root: INFO

review:
  rate-limit:
    window-seconds: ${REVIEW_RATE_WINDOW:60}
    user-max: ${REVIEW_RATE_USER_MAX:20}
    ip-max: ${REVIEW_RATE_IP_MAX:40}
    algorithm: ${REVIEW_RATE_ALGO:fixed}

resilience4j:
  circuitbreaker:
    instances:
      inventoryClient:
        sliding-window-size: 50
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
  retry:
    instances:
      inventoryClient:
        max-attempts: 2
        wait-duration: 100ms
  bulkhead:
    instances:
      inventoryClient:
        max-concurrent-calls: 50
        max-wait-duration: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
