server:
  port: 8084
  servlet:
    context-path: /community

spring:
  application:
    name: media-service
  redis:
    host: localhost
    port: 6379
    database: 11
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

community:
  path:
    domain: http://localhost:8080
    media: d:/work/data/upload/media
  media:
    allowed-image-types: jpg,jpeg,png,gif,webp
    allowed-video-types: mp4,webm,ogg
    max-image-mb: 10
    max-video-mb: 200

management:
  endpoints:
    web:
      exposure:
        include: '*'
        exclude: info,caches
