server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT_MS:1000}ms
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX:32}
          max-idle: ${REDIS_POOL_MAX_IDLE:16}
          min-idle: ${REDIS_POOL_MIN_IDLE:4}
          max-wait: ${REDIS_POOL_MAX_WAIT_MS:2000}ms
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: ${GATEWAY_RL_REPLENISH:200}
            redis-rate-limiter.burstCapacity: ${GATEWAY_RL_BURST:400}
            key-resolver: "#{@userOrIpKeyResolver}"
        - name: CircuitBreaker
          args:
            name: gatewayCircuit
            fallbackUri: forward:/fallback
      routes:
        - id: community-social-api
          uri: ${FORUM_SOCIAL_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/community/api/likes,/community/api/likes/**,/community/api/follow,/community/api/unfollow,/community/api/has-followed,/community/api/followees/count,/community/api/followers/count,/community/api/users/*/followees,/community/api/users/*/followers
        - id: community-user-api
          uri: ${FORUM_USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/community/api/session/**,/community/api/auth/**,/community/api/users,/community/api/users/**
        - id: community-message-api
          uri: ${FORUM_MESSAGE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/community/api/messages,/community/api/messages/**,/community/api/notices,/community/api/notices/**
        - id: community-media
          uri: ${FORUM_MEDIA_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/community/api/media/**,/community/media/**
        - id: community-data
          uri: ${FORUM_DATA_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/community/api/track,/community/api/admin/data/**,/community/data/**
        - id: community-user-web
          uri: ${FORUM_USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/community/login,/community/register,/community/logout,/community/activation/**,/community/kaptcha,/community/user/**,/community/header/**
        - id: community-message-web
          uri: ${FORUM_MESSAGE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/community/letter/**,/community/notice/**
        - id: community-social-web
          uri: ${FORUM_SOCIAL_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/community/like,/community/follow,/community/unfollow,/community/followees/**,/community/followers/**
        - id: community-post
          uri: ${FORUM_POST_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/community,/community/,/community/index,/community/error,/community/denied,/community/search,/community/share/**,/community/discuss/**,/community/comment/**,/community/alpha/**,/community/api/posts,/community/api/posts/**,/community/api/comments,/community/api/comments/**,/community/api/search,/community/api/search/**,/community/api/internal/**
        - id: product-gray
          uri: ${PRODUCT_GRAY_URL:http://localhost:18082}
          predicates:
            - Path=/api/products/**
            - Header=X-Canary, true
        - id: product
          uri: ${MALL_PRODUCT_SERVICE_URL:http://localhost:18082}
          predicates:
            - Path=/api/products/**,/api/merchant/**,/api/admin/reviews/**
        - id: auth
          uri: ${MALL_AUTH_SERVICE_URL:http://localhost:18081}
          predicates:
            - Path=/api/auth/**,/api/admin/users/**
        - id: user-profile
          uri: ${MALL_AUTH_SERVICE_URL:http://localhost:18081}
          predicates:
            - Path=/api/user/profile,/api/user/addresses/**
        - id: cart
          uri: ${MALL_CART_SERVICE_URL:http://localhost:18085}
          predicates:
            - Path=/api/user/cart/**
        - id: order
          uri: ${MALL_ORDER_SERVICE_URL:http://localhost:18084}
          predicates:
            - Path=/api/user/orders/**,/api/orders/**
        - id: reviews
          uri: ${MALL_PRODUCT_SERVICE_URL:http://localhost:18082}
          predicates:
            - Path=/api/user/reviews/**
        - id: support
          uri: ${MALL_SUPPORT_SERVICE_URL:http://localhost:18086}
          predicates:
            - Path=/api/user/after-sale/**,/api/user/support/**,/api/support/**,/api/agent/**,/api/ai/**

gateway:
  auth:
    public-paths:
      - /community/**
      - /api/auth/**
      - /api/products/**
      - /actuator/health
    user-id-header: X-User-Id
    role-header: X-User-Role

security:
  jwt:
    # 网关与商城各服务共用同一套 JWT 密钥，部署时务必通过环境变量覆盖。
    secret: ${JWT_SECRET:change-this-secret-key-32-bytes-min}
    expire-minutes: ${JWT_EXPIRE_MINUTES:120}

logging:
  level:
    root: INFO

resilience4j:
  circuitbreaker:
    instances:
      gatewayCircuit:
        sliding-window-size: 50
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
