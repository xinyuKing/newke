server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: localhost
      port: 6379
      timeout: ${REDIS_TIMEOUT_MS:1000}ms
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX:32}
          max-idle: ${REDIS_POOL_MAX_IDLE:16}
          min-idle: ${REDIS_POOL_MIN_IDLE:4}
          max-wait: ${REDIS_POOL_MAX_WAIT_MS:2000}ms
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: ${GATEWAY_RL_REPLENISH:200}
            redis-rate-limiter.burstCapacity: ${GATEWAY_RL_BURST:400}
            key-resolver: "#{@userOrIpKeyResolver}"
        - name: CircuitBreaker
          args:
            name: gatewayCircuit
            fallbackUri: forward:/fallback
      routes:
        - id: product-gray
          uri: ${PRODUCT_GRAY_URL:http://localhost:18082}
          predicates:
            - Path=/api/products/**
            - Header=X-Canary, true
        - id: product
          uri: http://localhost:18082
          predicates:
            - Path=/api/products/**,/api/merchant/**,/api/admin/reviews/**
        - id: auth
          uri: http://localhost:18081
          predicates:
            - Path=/api/auth/**,/api/admin/users/**
        - id: user-profile
          uri: http://localhost:18081
          predicates:
            - Path=/api/user/profile,/api/user/addresses/**
        - id: cart
          uri: http://localhost:18085
          predicates:
            - Path=/api/user/cart/**
        - id: order
          uri: http://localhost:18084
          predicates:
            - Path=/api/user/orders/**,/api/orders/**
        - id: reviews
          uri: http://localhost:18082
          predicates:
            - Path=/api/user/reviews/**
        - id: support
          uri: http://localhost:18086
          predicates:
            - Path=/api/user/after-sale/**,/api/user/support/**,/api/support/**,/api/agent/**,/api/ai/**

gateway:
  auth:
    public-paths:
      - /api/auth/**
      - /api/products/**
      - /actuator/health
    user-id-header: X-User-Id
    role-header: X-User-Role

security:
  jwt:
    secret: "change-this-secret-key-32-bytes-min"
    expire-minutes: 120

logging:
  level:
    root: INFO

resilience4j:
  circuitbreaker:
    instances:
      gatewayCircuit:
        sliding-window-size: 50
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
