server:
  port: 8083
  servlet:
    context-path: /community

spring:
  application:
    name: social-service
  redis:
    host: localhost
    port: 6379
    database: 11
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-consumer-group
      enable-auto-commit: true
      auto-commit-interval: 3000
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

management:
  endpoints:
    web:
      exposure:
        include: '*'
        exclude: info,caches
